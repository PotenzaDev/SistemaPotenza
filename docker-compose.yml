services:
  app:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - potenza
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/public:ro
    networks:
      - potenza
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    networks:
      - potenza
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: potenza-db
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - potenza_db_data:/var/lib/postgresql/data
    networks:
      - potenza
    restart: unless-stopped

networks:
  potenza:

volumes:
  potenza_db_data:

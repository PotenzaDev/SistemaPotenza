services:
  app:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/public:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    restart: unless-stopped

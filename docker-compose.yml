services:
  app:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - potenza_storage:/var/www/storage/app/public
    depends_on:
      - db
    networks:
      - potenza
    restart: unless-stopped
  backend-nginx:
    image: nginx:alpine
    depends_on:
      - app
    volumes:
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/public
      - potenza_storage:/var/www/public/storage:ro
    networks:
      - potenza
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
    networks:
      - potenza
    restart: unless-stopped
  gateway:
    image: nginx:alpine
    depends_on:
      - frontend
      - backend-nginx
    ports:
      - "80:80"
    volumes:
      - ./gateway/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - potenza
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    container_name: potenza-db
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - potenza_db_data:/var/lib/postgresql/data
    networks:
      - potenza
    restart: unless-stopped
networks:
  potenza:
volumes:
  potenza_db_data:
  potenza_storage:
